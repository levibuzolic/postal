name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  LIBPOSTAL_VERSION: "1.1"
  NIF_VERSION: "2.17"

jobs:
  build:
    name: NIF ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            install-libpostal: brew
          - target: x86_64-apple-darwin
            runner: macos-13
            install-libpostal: brew
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            install-libpostal: source
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            install-libpostal: source

    steps:
      - uses: actions/checkout@v6

      - name: Cache libpostal
        id: cache-libpostal
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/libpostal*
            /usr/local/include/libpostal
            /tmp/libpostal-data
          key: libpostal-${{ env.LIBPOSTAL_VERSION }}-${{ matrix.target }}

      - name: Install libpostal (brew)
        if: matrix.install-libpostal == 'brew'
        run: brew install libpostal

      - name: Install libpostal (source)
        if: matrix.install-libpostal == 'source' && steps.cache-libpostal.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
          git clone --depth 1 https://github.com/openvenues/libpostal /tmp/libpostal-src
          cd /tmp/libpostal-src
          ./bootstrap.sh
          ./configure --datadir=/tmp/libpostal-data
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Ensure libpostal linker cache is up to date (Linux)
        if: matrix.install-libpostal == 'source' && steps.cache-libpostal.outputs.cache-hit == 'true'
        run: sudo ldconfig

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: postal_nif
          project-version: ${{ github.ref_name }}
          target: ${{ matrix.target }}
          nif-version: ${{ env.NIF_VERSION }}
          # Empty string instead of false to work around composite action bug
          # where string 'false' is truthy and triggers cross installation
          use-cross: ""
          project-dir: native/postal_nif

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build-crate.outputs.file-path }}

  publish:
    name: Publish to Hex
    needs: build
    runs-on: ubuntu-latest
    environment: hex-publish

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Verify tag matches mix.exs version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MIX_VERSION=$(grep '@version "' mix.exs | sed 's/.*@version "//;s/"//')
          if [ "$TAG_VERSION" != "$MIX_VERSION" ]; then
            echo "::error::Tag version (v$TAG_VERSION) does not match mix.exs version ($MIX_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: mix deps.get

      - name: Generate checksums
        run: mix rustler_precompiled.download Postal.Native --all --print
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
