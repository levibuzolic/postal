name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest
    environment: hex-publish

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Verify tag matches mix.exs version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MIX_VERSION=$(grep '@version "' mix.exs | sed 's/.*@version "//;s/"//')
          if [ "$TAG_VERSION" != "$MIX_VERSION" ]; then
            echo "::error::Tag version (v$TAG_VERSION) does not match mix.exs version ($MIX_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: mix deps.get

      - name: Generate checksums
        run: mix rustler_precompiled.download Postal.Native --all --print
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
